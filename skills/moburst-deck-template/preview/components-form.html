<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Components · Form</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    width: 700px; height: 260px; background: #050505;
    padding: 28px 32px; box-sizing: border-box;
    font-family: var(--mb-font-sans); color: #fff;
    display: flex; flex-direction: column; gap: 14px;
  }
  .eyebrow { font-size: 11px; color: var(--mb-fg-3); letter-spacing: 0.18em; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--mb-fg-3); }
  input, select {
    height: 42px; padding: 0 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 10px;
    color: #fff; font-family: inherit; font-size: 14px;
    outline: none;
    transition: border-color .16s, box-shadow .16s;
  }
  input:focus, select:focus { border-color: rgba(185,224,69,0.7); box-shadow: 0 0 0 3px rgba(185,224,69,0.18); }
  input::placeholder { color: var(--mb-fg-4); }
  .checkbox { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--mb-fg-2); }
  .checkbox input { all: revert; accent-color: #B9E045; }
  .btn {
    height: 42px; padding: 0 22px;
    border-radius: 999px; border: 0;
    background: #B9E045; color: #0A0A0A;
    font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer;
    box-shadow: 0 0 24px rgba(185,224,69,0.4);
  }
</style>
</head>
<body class="mb-root">
  <div class="eyebrow">Form — data room request</div>
  <div class="grid">
    <div class="field"><label>Name</label><input placeholder="Jane Investor"></div>
    <div class="field"><label>Firm</label><input placeholder="Sequoia Growth"></div>
    <div class="field"><label>Email</label><input placeholder="jane@firm.com"></div>
    <div class="field"><label>Ticket size</label>
      <select>
        <option>$5M – $10M</option>
        <option>$10M – $25M</option>
        <option>$25M+</option>
      </select>
    </div>
  </div>
  <div style="display:flex; align-items:center; justify-content:space-between;">
    <label class="checkbox"><input type="checkbox" checked> I agree to the NDA terms.</label>
    <button class="btn">Request access →</button>
  </div>
</body>
</html>
