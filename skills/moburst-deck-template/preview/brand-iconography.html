<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand · Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    width: 700px; height: 220px; background: #050505;
    padding: 28px 32px; box-sizing: border-box;
    font-family: var(--mb-font-sans); color: #fff;
    display: flex; flex-direction: column; gap: 16px;
  }
  .eyebrow { font-size: 11px; color: var(--mb-fg-3); letter-spacing: 0.18em; text-transform: uppercase; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .tile {
    aspect-ratio: 1.6;
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 12px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px;
  }
  .glyph { font-size: 26px; font-weight: 700; color: #B9E045; line-height: 1; }
  .name { font-size: 10px; color: var(--mb-fg-4); font-family: ui-monospace, Menlo, monospace; }
  .note { font-size: 11.5px; color: var(--mb-fg-3); line-height: 1.5; }
</style>
</head>
<body class="mb-root">
  <div class="eyebrow">Iconography — typographic, not pictographic</div>
  <div class="row">
    <div class="tile"><span class="glyph">01</span><span class="name">numbered</span></div>
    <div class="tile"><span class="glyph">•</span><span class="name">bullet</span></div>
    <div class="tile"><span class="glyph">▸</span><span class="name">key bullet</span></div>
    <div class="tile"><span class="glyph">→</span><span class="name">arrow</span></div>
    <div class="tile"><span class="glyph">·</span><span class="name">separator</span></div>
    <div class="tile"><span class="glyph">×</span><span class="name">multiplier</span></div>
  </div>
  <div class="note">No emoji. No pictograms. When a real icon is unavoidable, substitute Lucide at 1.5px stroke and flag the swap.</div>
</body>
</html>
