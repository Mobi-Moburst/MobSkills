<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing · 4pt scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    width: 700px; height: 240px; background: #050505;
    padding: 28px 32px; box-sizing: border-box;
    font-family: var(--mb-font-sans); color: #fff;
    display: flex; flex-direction: column; gap: 14px;
  }
  .eyebrow { font-size: 11px; color: var(--mb-fg-3); letter-spacing: 0.18em; text-transform: uppercase; }
  .row { display: grid; grid-template-columns: 60px 1fr 60px; align-items: center; gap: 14px; }
  .name { font-size: 11.5px; font-family: ui-monospace, Menlo, monospace; color: var(--mb-fg-3); }
  .px { font-size: 11px; font-family: ui-monospace, Menlo, monospace; color: var(--mb-fg-4); text-align: right; }
  .bar { height: 10px; background: #B9E045; border-radius: 4px; box-shadow: 0 0 12px rgba(185,224,69,0.4); }
</style>
</head>
<body class="mb-root">
  <div class="eyebrow">Spacing scale · 4pt rhythm</div>
  <div class="row"><span class="name">space‑1</span><span class="bar" style="width: 4px"></span><span class="px">4 px</span></div>
  <div class="row"><span class="name">space‑2</span><span class="bar" style="width: 8px"></span><span class="px">8 px</span></div>
  <div class="row"><span class="name">space‑3</span><span class="bar" style="width: 16px"></span><span class="px">12 px</span></div>
  <div class="row"><span class="name">space‑4</span><span class="bar" style="width: 32px"></span><span class="px">16 px</span></div>
  <div class="row"><span class="name">space‑5</span><span class="bar" style="width: 64px"></span><span class="px">24 px</span></div>
  <div class="row"><span class="name">space‑6</span><span class="bar" style="width: 120px"></span><span class="px">32 px</span></div>
  <div class="row"><span class="name">space‑7</span><span class="bar" style="width: 200px"></span><span class="px">48 px</span></div>
  <div class="row"><span class="name">space‑8</span><span class="bar" style="width: 320px"></span><span class="px">64 px</span></div>
</body>
</html>
