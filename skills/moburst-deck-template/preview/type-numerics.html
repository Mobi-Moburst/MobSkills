<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type · Numeric callouts</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    width: 700px; height: 240px; background: #050505;
    padding: 24px 32px; box-sizing: border-box;
    font-family: var(--mb-font-sans); color: #fff;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; align-items: stretch;
  }
  .cell {
    border: 1px solid rgba(185,224,69,0.4);
    border-radius: 16px; padding: 16px;
    background: rgba(185,224,69,0.02);
    box-shadow: 0 0 18px rgba(185,224,69,0.10) inset;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .num {
    font-weight: 700;
    font-size: 64px; line-height: 0.9;
    letter-spacing: -0.04em;
    color: #B9E045;
  }
  .cap {
    font-size: 11px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--mb-fg-3);
  }
  .lbl {
    font-size: 13px; font-weight: 500;
    color: var(--mb-fg-2);
    line-height: 1.3;
  }
</style>
</head>
<body class="mb-root">
  <div class="cell">
    <span class="cap">Run‑rate</span>
    <span class="num">$25M</span>
    <span class="lbl">2026 projection</span>
  </div>
  <div class="cell">
    <span class="cap">Top‑line</span>
    <span class="num">+75%</span>
    <span class="lbl">last 9 months</span>
  </div>
  <div class="cell">
    <span class="cap">Horizon</span>
    <span class="num">$500M</span>
    <span class="lbl">2029 target</span>
  </div>
</body>
</html>
