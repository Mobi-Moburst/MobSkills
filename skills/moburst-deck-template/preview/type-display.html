<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type · Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    width: 700px; height: 280px; background: #050505;
    padding: 32px 36px; box-sizing: border-box;
    font-family: var(--mb-font-sans);
    color: #fff;
    display: flex; flex-direction: column; gap: 16px;
  }
  .eyebrow { font-size: 11px; color: var(--mb-fg-3); letter-spacing: 0.18em; text-transform: uppercase; }
  .hero {
    font-weight: 700; font-size: 44px; line-height: 0.98;
    letter-spacing: -0.035em; text-wrap: balance;
  }
  .hero em { font-style: normal; color: #B9E045; }
  .meta {
    margin-top: auto;
    font-size: 11px; color: var(--mb-fg-4);
    font-family: ui-monospace, Menlo, monospace;
    display: flex; gap: 24px;
  }
</style>
</head>
<body class="mb-root">
  <div class="eyebrow">Display · Inter 700</div>
  <div class="hero">
    The AI‑Native<br>
    Growth Operating <em>System</em>.
  </div>
  <div class="meta">
    <span>weight 700</span>
    <span>tracking −0.035em</span>
    <span>line‑height 0.98</span>
  </div>
</body>
</html>
