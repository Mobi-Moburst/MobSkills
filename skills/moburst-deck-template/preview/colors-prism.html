<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors · Prism accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    width: 700px; height: 220px; background: #0a0a0a;
    padding: 28px 32px; box-sizing: border-box;
    color: #fff; font-family: var(--mb-font-sans);
    display: flex; flex-direction: column; gap: 14px;
  }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw {
    height: 110px; border-radius: 12px; padding: 12px;
    box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between;
    color: #0a0a0a;
  }
  .sw .label { font-weight: 700; font-size: 13px; letter-spacing: -0.01em; }
  .sw .hex { font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; opacity: 0.6; }
  .cyan { background: #2DE4FF; }
  .yellow { background: #FFE334; }
  .green { background: #B9E045; }
  .pink { background: #FF6671; }
  .meta { font-size: 11px; color: var(--mb-fg-3); letter-spacing: 0.16em; text-transform: uppercase; }
  .note { font-size: 11.5px; color: var(--mb-fg-3); line-height: 1.5; }
</style>
</head>
<body class="mb-root">
  <div class="meta">Logo / prism accents</div>
  <div class="row">
    <div class="sw cyan"><span class="label">Cyan</span><span class="hex">#2DE4FF</span></div>
    <div class="sw yellow"><span class="label">Yellow</span><span class="hex">#FFE334</span></div>
    <div class="sw green"><span class="label">Green</span><span class="hex">#B9E045</span></div>
    <div class="sw pink"><span class="label">Pink</span><span class="hex">#FF6671</span></div>
  </div>
  <div class="note">Reserved for the M‑mark and the rare service‑category dot. Never use in body copy or numeric KPIs.</div>
</body>
</html>
