<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand · Logo lockup</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    width: 700px; height: 220px;
    background:
      radial-gradient(50% 80% at 20% 100%, rgba(185,224,69,0.08), transparent 60%),
      radial-gradient(40% 60% at 95% 0%, rgba(45,228,255,0.06), transparent 60%),
      #050505;
    display: flex; align-items: center; justify-content: center;
    padding: 0 64px; box-sizing: border-box;
    font-family: var(--mb-font-sans);
  }
  .mark { display: flex; align-items: center; gap: 28px; }
  .mark img { height: 96px; width: auto; display: block; }
  .meta { display: flex; flex-direction: column; gap: 6px; }
  .name { color: #fff; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
  .stamp { color: var(--mb-fg-3); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; }
</style>
</head>
<body class="mb-root">
  <div class="mark">
    <img src="../assets/logo-moburst-color.png" alt="Moburst lockup">
    <div class="meta">
      <span class="name">Moburst</span>
      <span class="stamp">Primary lockup · on void</span>
    </div>
  </div>
</body>
</html>
