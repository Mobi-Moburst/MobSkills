<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Components · Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    width: 700px; height: 240px; background: #050505;
    padding: 28px 32px; box-sizing: border-box;
    font-family: var(--mb-font-sans); color: #fff;
    display: flex; flex-direction: column; gap: 16px;
  }
  .eyebrow { font-size: 11px; color: var(--mb-fg-3); letter-spacing: 0.18em; text-transform: uppercase; }
  .row { display: flex; gap: 12px; align-items: center; }
  .btn {
    height: 44px; padding: 0 22px;
    border-radius: 999px; border: 0;
    font-family: inherit; font-size: 14px; font-weight: 600;
    letter-spacing: -0.01em; cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    transition: all .16s cubic-bezier(.16,1,.3,1);
  }
  .btn--primary {
    background: #B9E045; color: #0A0A0A;
    box-shadow: 0 0 24px rgba(185,224,69,0.4);
  }
  .btn--primary:hover { background: #C8EE56; box-shadow: 0 0 36px rgba(185,224,69,0.55); }
  .btn--secondary {
    background: transparent; color: #fff;
    border: 1px solid rgba(185,224,69,0.55);
    box-shadow: 0 0 18px rgba(185,224,69,0.10);
  }
  .btn--ghost {
    background: transparent; color: var(--mb-fg-2);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .btn--text {
    background: transparent; color: #B9E045;
    padding: 0 4px; height: auto;
  }
  .arrow { font-size: 16px; line-height: 1; transform: translateY(-1px); }
</style>
</head>
<body class="mb-root">
  <div class="eyebrow">Buttons</div>
  <div class="row">
    <button class="btn btn--primary">Request data room <span class="arrow">→</span></button>
    <button class="btn btn--secondary">View memo</button>
    <button class="btn btn--ghost">Decline</button>
    <button class="btn btn--text">Open the deck →</button>
  </div>
  <div class="row" style="opacity:.7">
    <button class="btn btn--primary">Hover state</button>
    <button class="btn btn--primary" disabled style="opacity:.4;cursor:not-allowed;box-shadow:none">Disabled</button>
  </div>
</body>
</html>
