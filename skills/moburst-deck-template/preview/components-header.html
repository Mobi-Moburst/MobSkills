<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Components · Header bar</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    width: 700px; height: 220px;
    background: #000 url("../assets/bg-starfield.png") center/cover no-repeat;
    padding: 0; box-sizing: border-box;
    font-family: var(--mb-font-sans); color: #fff;
    display: flex; flex-direction: column;
  }
  .bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px;
    background: rgba(10,10,10,0.55);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .lockup { display: flex; align-items: center; gap: 12px; }
  .lockup img { height: 28px; }
  .mark { font-size: 13px; font-weight: 700; letter-spacing: -0.02em; }
  nav { display: flex; gap: 24px; font-size: 13px; color: var(--mb-fg-3); }
  nav a { color: inherit; text-decoration: none; }
  nav a.active { color: #fff; }
  .cta {
    height: 36px; padding: 0 16px; border-radius: 999px;
    background: #B9E045; color: #0a0a0a; border: 0;
    font-family: inherit; font-size: 12.5px; font-weight: 600;
    cursor: pointer;
    box-shadow: 0 0 18px rgba(185,224,69,0.35);
  }
  .body-stamp {
    padding: 20px 24px;
    font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--mb-fg-4);
  }
</style>
</head>
<body class="mb-root">
  <div class="bar">
    <div class="lockup">
      <img src="../assets/logo-moburst-color.png" alt="">
      <span class="mark">Moburst</span>
    </div>
    <nav>
      <a class="active">Memo</a>
      <a>The gOS</a>
      <a>Track record</a>
      <a>Team</a>
    </nav>
    <button class="cta">Data room</button>
  </div>
  <div class="body-stamp">Private · Confidential · Investment Memorandum · 2026</div>
</body>
</html>
