<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors · Primary palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    width: 700px; height: 220px; background: #0a0a0a;
    padding: 28px 32px; box-sizing: border-box;
    color: #fff; font-family: var(--mb-font-sans);
    display: flex; flex-direction: column; gap: 20px;
  }
  .row { display: flex; gap: 12px; }
  .swatch {
    flex: 1; height: 120px; border-radius: 14px;
    padding: 14px; box-sizing: border-box;
    display: flex; flex-direction: column; justify-content: space-between;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .swatch .name { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
  .swatch .hex { font-size: 11px; opacity: 0.7; font-family: ui-monospace, Menlo, monospace; }
  .ink   { background: #000; }
  .lime  { background: #B9E045; color: #0a0a0a; box-shadow: 0 0 36px rgba(185,224,69,0.35); }
  .lime .hex { opacity: 0.65; }
  .paper { background: #fff; color: #0a0a0a; }
  .paper .hex { opacity: 0.55; }
  .meta {
    font-size: 11px; color: var(--mb-fg-3);
    letter-spacing: 0.16em; text-transform: uppercase;
  }
</style>
</head>
<body class="mb-root">
  <div class="meta">Core palette — monochrome + one accent</div>
  <div class="row">
    <div class="swatch ink"><span class="name">Ink</span><span class="hex">#000000 · --mb-ink</span></div>
    <div class="swatch lime"><span class="name">gOS Lime</span><span class="hex">#B9E045 · --mb-lime</span></div>
    <div class="swatch paper"><span class="name">Paper</span><span class="hex">#FFFFFF · --mb-paper</span></div>
  </div>
</body>
</html>
