<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing · Glow elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    width: 700px; height: 240px; background: #050505;
    padding: 28px 32px; box-sizing: border-box;
    font-family: var(--mb-font-sans); color: #fff;
    display: flex; flex-direction: column; gap: 18px;
  }
  .eyebrow { font-size: 11px; color: var(--mb-fg-3); letter-spacing: 0.18em; text-transform: uppercase; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; flex: 1; }
  .card {
    border-radius: 20px;
    padding: 16px;
    background: rgba(20,20,20,0.6);
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .lbl { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mb-fg-3); }
  .name { font-size: 14px; font-weight: 600; }
  .quiet { border: 1px solid rgba(255,255,255,0.10); }
  .soft  { border: 1px solid rgba(185,224,69,0.5);  box-shadow: 0 0 0 1px rgba(185,224,69,0.25), 0 0 18px rgba(185,224,69,0.12); }
  .strong{ border: 1px solid rgba(185,224,69,0.9);  box-shadow: 0 0 0 1px rgba(185,224,69,0.6),  0 0 24px rgba(185,224,69,0.25), 0 0 64px rgba(185,224,69,0.12); }
</style>
</head>
<body class="mb-root">
  <div class="eyebrow">Elevation — glow, not shadow</div>
  <div class="row">
    <div class="card quiet"><span class="lbl">No glow</span><span class="name">Quiet card</span></div>
    <div class="card soft"><span class="lbl">Soft glow</span><span class="name">Default card</span></div>
    <div class="card strong"><span class="lbl">Strong glow</span><span class="name">Featured / KPI</span></div>
  </div>
</body>
</html>
