  </g>
  <!-- "moburst" text -->
  <text x="10" y="62" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="36" font-weight="300" fill="#FAFAFA" letter-spacing="1">moburst</text>
</svg>
